<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unit Converter</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main>
		<section class="panel" aria-labelledby="page-title">
			<h1 id="page-title">Unit Converter</h1>

			<nav aria-label="Converter categories">
				<ul class="tabs">
					<li><a href="/index.html" aria-current="page">Length</a></li>
					<li><a href="/weight.html">Weight</a></li>
					<li><a href="/temperature.html">Temperature</a></li>
				</ul>
			</nav>

			<form class="converter-form" action="/convert/length" method="GET" data-converter-form>
				<div>
					<label for="length-value">Enter the length to convert</label>
					<input id="length-value" name="length-value" type="number" autocomplete="off" required>
				</div>

				<div>
					<label for="from-unit">Unit to Convert from</label>
					<select id="from-unit" name="from-unit" required>
						<option value="mm">Millimeter</option>
						<option value="cm">Centimeter</option>
						<option value="m" selected>Meter</option>
						<option value="km">Kilometer</option>
						<option value="in">Inch</option>
						<option value="ft">Foot</option>
						<option value="yd">Yard</option>
						<option value="mi">Mile</option>
					</select>
				</div>

				<div>
					<label for="to-unit">Unit to Convert to</label>
					<select id="to-unit" name="to-unit" required>
						<option value="mm">Millimeter</option>
						<option value="cm">Centimeter</option>
						<option value="m">Meter</option>
						<option value="km">Kilometer</option>
						<option value="in">Inch</option>
						<option value="ft">Foot</option>
						<option value="yd">Yard</option>
						<option value="mi" selected>Mile</option>
					</select>
				</div>

				<button type="submit" disabled>Convert</button>
			</form>
		</section>
	</main>

	
	<script>
		const submitButton = document.querySelector('button[type="submit"]');
		const lengthValueInput = document.querySelector('input[name="length-value"]');
		function updateSubmitState() {
			submitButton.disabled = lengthValueInput.value.trim() === '';
		}
		lengthValueInput.addEventListener('input', updateSubmitState);
		lengthValueInput.addEventListener('change', updateSubmitState);
		updateSubmitState();
	</script>
</body>
</html>
