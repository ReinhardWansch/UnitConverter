<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unit Converter - Temperature</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main>
		<section class="panel" aria-labelledby="page-title">
			<h1 id="page-title">Unit Converter</h1>

			<nav aria-label="Converter categories">
				<ul class="tabs">
					<li><a href="/index.html">Length</a></li>
					<li><a href="/weight.html">Weight</a></li>
					<li><a href="/temperature.html" aria-current="page">Temperature</a></li>
				</ul>
			</nav>

			<form class="converter-form" method="GET" action="/convert/temperature">
				<div>
					<label for="temperature-value">Enter the temperature to convert</label>
					<input id="temperature-value" name="temperature-value" type="text" autocomplete="off" required>
				</div>

				<div>
					<label for="from-unit">Unit to Convert from</label>
					<select id="from-unit" name="from-unit" required>
						<option value="C" selected>Celsius</option>
						<option value="F">Fahrenheit</option>
						<option value="K">Kelvin</option>
					</select>
				</div>

				<div>
					<label for="to-unit">Unit to Convert to</label>
					<select id="to-unit" name="to-unit" required>
						<option value="C">Celsius</option>
						<option value="F">Fahrenheit</option>
						<option value="K" selected>Kelvin</option>
					</select>
				</div>

				<button type="submit">Convert</button>
			</form>
		</section>
	</main>


	<script>
		const submitButton = document.querySelector('button[type="submit"]');
		const temperatureValueInput = document.querySelector('input[name="temperature-value"]');
		function updateSubmitState() {
			submitButton.disabled = temperatureValueInput.value.trim() === '';
		}
		temperatureValueInput.addEventListener('input', updateSubmitState);
		temperatureValueInput.addEventListener('change', updateSubmitState);
		updateSubmitState();
	</script>
</body>
</html>
