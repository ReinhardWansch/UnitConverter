<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unit Converter - Weight</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #f3f3f1;
			--card: #f7f7f6;
			--text: #1f1f1f;
			--accent: #4d6cff;
			--border: #2b2b2b;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			padding: 24px;
			background: radial-gradient(circle at top, #fafaf8 0%, var(--bg) 58%);
			color: var(--text);
			font-family: 'Patrick Hand', cursive;
		}

		main {
			max-width: 560px;
			margin: 0 auto;
		}

		.panel {
			background: var(--card);
			border: 4px solid var(--border);
			border-radius: 14px;
			min-height: 720px;
			padding: 22px 26px 28px;
			box-shadow: 0 2px 0 rgba(0, 0, 0, 0.08);
		}

		h1 {
			margin: 0;
			font-size: clamp(2.8rem, 5vw, 3.5rem);
			line-height: 0.95;
			font-weight: 400;
		}

		.tabs {
			display: flex;
			gap: 28px;
			margin: 26px 0 42px;
			padding: 0;
			list-style: none;
			font-size: clamp(1.9rem, 4vw, 2.5rem);
		}

		.tabs a {
			color: var(--text);
			text-decoration: none;
			position: relative;
		}

		.tabs a[aria-current="page"] {
			color: var(--accent);
		}

		.tabs a[aria-current="page"]::after {
			content: "";
			position: absolute;
			left: 0;
			right: 0;
			bottom: -4px;
			height: 4px;
			border-radius: 999px;
			background: var(--accent);
		}

		.converter-form {
			display: grid;
			gap: 18px;
		}

		label {
			display: block;
			font-size: clamp(2rem, 4vw, 2.4rem);
			line-height: 1.1;
			margin-bottom: 8px;
		}

		input,
		select,
		button {
			width: 100%;
			border: 4px solid var(--border);
			border-radius: 10px;
			background: #fff;
			color: var(--text);
			font: inherit;
		}

		input,
		select {
			height: 48px;
			padding: 4px 14px;
			font-size: 2rem;
			appearance: none;
		}

		button {
			width: 200px;
			margin-top: 8px;
			padding: 12px 18px;
			font-size: 2rem;
			cursor: pointer;
			box-shadow: 0 2px 0 rgba(0, 0, 0, 0.1);
		}

		button:hover {
			background: #f5f5f5;
		}

		button:disabled {
			cursor: not-allowed;
			opacity: 0.55;
		}

		button:disabled:hover {
			background: #fff;
		}

		@media (max-width: 640px) {
			body {
				padding: 14px;
			}

			.panel {
				min-height: auto;
				padding: 18px;
			}

			.tabs {
				gap: 18px;
				flex-wrap: wrap;
				margin-bottom: 28px;
			}

			button {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<main>
		<section class="panel" aria-labelledby="page-title">
			<h1 id="page-title">Unit Converter</h1>

			<nav aria-label="Converter categories">
				<ul class="tabs">
					<li><a href="/index.html">Length</a></li>
					<li><a href="/weight.html" aria-current="page">Weight</a></li>
					<li><a href="/temperature.html">Temperature</a></li>
				</ul>
			</nav>

			<form class="converter-form" method="GET" action="/convert/weight">
				<div>
					<label for="weight-value">Enter the weight to convert</label>
					<input id="weight-value" name="weight-value" type="text" autocomplete="off" required>
				</div>

				<div>
					<label for="from-unit">Unit to Convert from</label>
					<select id="from-unit" name="from-unit">
						<option value="mg">Milligram</option>
						<option value="g">Gram</option>
						<option value="kg" selected>Kilogram</option>
						<option value="oz">Ounce</option>
						<option value="lb">Pound</option>
					</select>
				</div>

				<div>
					<label for="to-unit">Unit to Convert to</label>
					<select id="to-unit" name="to-unit">
						<option value="mg">Milligram</option>
						<option value="g">Gram</option>
						<option value="kg">Kilogram</option>
						<option value="oz">Ounce</option>
						<option value="lb" selected>Pound</option>
					</select>
				</div>

				<button type="submit">Convert</button>
			</form>
		</section>
	</main>


	<script>
		const submitButton = document.querySelector('button[type="submit"]');
		const weightValueInput = document.querySelector('input[name="weight-value"]');
		function updateSubmitState() {
			submitButton.disabled = weightValueInput.value.trim() === '';
		}
		weightValueInput.addEventListener('input', updateSubmitState);
		weightValueInput.addEventListener('change', updateSubmitState);
		updateSubmitState();
	</script>
</body>
</html>
