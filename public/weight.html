<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unit Converter - Weight</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main>
		<section class="panel" aria-labelledby="page-title">
			<h1 id="page-title">Unit Converter</h1>

			<nav aria-label="Converter categories">
				<ul class="tabs">
					<li><a href="/index.html">Length</a></li>
					<li><a href="/weight.html" aria-current="page">Weight</a></li>
					<li><a href="/temperature.html">Temperature</a></li>
				</ul>
			</nav>

			<form class="converter-form" method="GET" action="/convert/weight">
				<div>
					<label for="weight-value">Enter the weight to convert</label>
					<input id="weight-value" name="weight-value" type="text" autocomplete="off" required>
				</div>

				<div>
					<label for="from-unit">Unit to Convert from</label>
					<select id="from-unit" name="from-unit">
						<option value="mg">Milligram</option>
						<option value="g">Gram</option>
						<option value="kg" selected>Kilogram</option>
						<option value="oz">Ounce</option>
						<option value="lb">Pound</option>
					</select>
				</div>

				<div>
					<label for="to-unit">Unit to Convert to</label>
					<select id="to-unit" name="to-unit">
						<option value="mg">Milligram</option>
						<option value="g">Gram</option>
						<option value="kg">Kilogram</option>
						<option value="oz">Ounce</option>
						<option value="lb" selected>Pound</option>
					</select>
				</div>

				<button type="submit">Convert</button>
			</form>
		</section>
	</main>


	<script>
		const submitButton = document.querySelector('button[type="submit"]');
		const weightValueInput = document.querySelector('input[name="weight-value"]');
		function updateSubmitState() {
			submitButton.disabled = weightValueInput.value.trim() === '';
		}
		weightValueInput.addEventListener('input', updateSubmitState);
		weightValueInput.addEventListener('change', updateSubmitState);
		updateSubmitState();
	</script>
</body>
</html>
