<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unit Converter - Result</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #f3f3f1;
			--card: #f7f7f6;
			--text: #1f1f1f;
			--accent: #4d6cff;
			--border: #2b2b2b;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			padding: 24px;
			background: radial-gradient(circle at top, #fafaf8 0%, var(--bg) 58%);
			color: var(--text);
			font-family: 'Patrick Hand', cursive;
		}

		main {
			max-width: 560px;
			margin: 0 auto;
		}

		.panel {
			background: var(--card);
			border: 4px solid var(--border);
			border-radius: 14px;
			min-height: 720px;
			padding: 22px 26px 28px;
			box-shadow: 0 2px 0 rgba(0, 0, 0, 0.08);
		}

		h1 {
			margin: 0;
			font-size: clamp(2.8rem, 5vw, 3.5rem);
			line-height: 0.95;
			font-weight: 400;
		}

		.tabs {
			display: flex;
			gap: 28px;
			margin: 26px 0 42px;
			padding: 0;
			list-style: none;
			font-size: clamp(1.9rem, 4vw, 2.5rem);
		}

		.tabs a {
			color: var(--text);
			text-decoration: none;
			position: relative;
		}

		.tabs a[aria-current="page"] {
			color: var(--accent);
		}

		.tabs a[aria-current="page"]::after {
			content: "";
			position: absolute;
			left: 0;
			right: 0;
			bottom: -4px;
			height: 4px;
			border-radius: 999px;
			background: var(--accent);
		}

		.result-copy {
			font-size: clamp(2.2rem, 4.4vw, 2.8rem);
			line-height: 1.1;
			margin: 0 0 10px;
		}

		.result-value {
			margin: 0 0 28px;
			font-size: clamp(3rem, 7vw, 4.2rem);
			line-height: 1;
			font-weight: 400;
		}

		.reset-button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 200px;
			padding: 12px 18px;
			border: 4px solid var(--border);
			border-radius: 10px;
			background: #fff;
			color: var(--text);
			font: inherit;
			font-size: 2rem;
			text-decoration: none;
			box-shadow: 0 2px 0 rgba(0, 0, 0, 0.1);
		}

		.reset-button:hover {
			background: #f5f5f5;
		}

		@media (max-width: 640px) {
			body {
				padding: 14px;
			}

			.panel {
				min-height: auto;
				padding: 18px;
			}

			.tabs {
				gap: 18px;
				flex-wrap: wrap;
				margin-bottom: 28px;
			}

			.reset-button {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<main>
		<section class="panel" aria-labelledby="page-title">
			<h1 id="page-title">Unit Converter</h1>

			<nav aria-label="Converter categories">
				<ul class="tabs">
					<li><a href="/index.html" aria-current="page">Length</a></li>
					<li><a href="/weight.html">Weight</a></li>
					<li><a href="/temperature.html">Temperature</a></li>
				</ul>
			</nav>

			<p class="result-copy">{{RESULT_LABEL}}</p>
			<p class="result-value">{{RESULT_VALUE}}</p>

			<a class="reset-button" href="/index.html">Reset</a>
		</section>
	</main>
</body>
</html>
